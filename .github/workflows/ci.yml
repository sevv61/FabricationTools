name: Fabrication Tools CI

on:
	push:
		branches:
			- main
			- develop
			- "feature/**"

	pull_request:
		branches:
			- main
			- develop

jobs:
	lint:

		runs-on: ubuntu-latest

		steps:

			- name: Checkout Repository
				uses: actions/checkout@v4

			- name: Setup Python
				uses: actions/setup-python@v5
				with:
					python-version: "3.11"

			- name: Install Dependencies
				run: |
					python -m pip install --upgrade pip
					pip install black
					pip install ruff

			- name: Check Formatting
				run: |
					black --check .

			- name: Run Ruff
				run: |
					ruff check .

